version: '3.9'

services:
  postgres:
    container_name: evolution_postgres
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: evolution
      POSTGRES_PASSWORD: evolution123
      POSTGRES_DB: evolutionapi
    volumes:
      - evolution_postgres:/var/lib/postgresql/data

  redis:
    container_name: evolution_redis
    image: redis:7-alpine
    restart: always
    volumes:
      - evolution_redis:/data

  evolution-api:
    container_name: evolution_api
    image: atendai/evolution-api:v2.2.3
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    environment:
      SERVER_URL: http://localhost:8080
      AUTHENTICATION_API_KEY: NICKAPIENCONDER2
      DATABASE_ENABLED: "true"
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://evolution:evolution123@postgres:5432/evolutionapi?schema=public
      DATABASE_CONNECTION_CLIENT_NAME: evolution_v2
      CACHE_REDIS_ENABLED: "false"       # ← desabilitado
      CACHE_REDIS_URI: redis://redis:6379/1
      CACHE_REDIS_PREFIX_KEY: evolution2
      CACHE_REDIS_SAVE_INSTANCES: "false"
      CACHE_LOCAL_ENABLED: "true"        # ← ativado
      LOG_LEVEL: ERROR
      CONFIG_SESSION_PHONE_VERSION: "2.3000.1038651499"
      DATABASE_SAVE_DATA_NEW_MESSAGE: "true"
      DATABASE_SAVE_MESSAGE_UPDATE: "true"
    volumes:
      - evolution_instances:/evolution/instances

volumes:
  evolution_postgres:
  evolution_redis:
  evolution_instances: